# 真实 Bedrock 测试:opus-4-7,三个跨区 profile(US / JP / EU)= 三个独立缓存域。
# 权重 US:JP:EU = 3:2:1(model_info.hrw_weight)。凭证全部走环境变量。
model_list:
  - model_name: claude-aff
    litellm_params:
      model: os.environ/MODEL_A                     # us.anthropic.claude-opus-4-7
      aws_region_name: os.environ/REGION_A          # us-east-1
      api_key: os.environ/AWS_BEARER_TOKEN_BEDROCK
      tags: ["acct-0"]
    model_info:
      id: dep-us
      hrw_weight: 3
  - model_name: claude-aff
    litellm_params:
      model: os.environ/MODEL_B                     # jp.anthropic.claude-opus-4-7
      aws_region_name: os.environ/REGION_B          # ap-northeast-1
      api_key: os.environ/AWS_BEARER_TOKEN_BEDROCK
      tags: ["acct-1"]
    model_info:
      id: dep-jp
      hrw_weight: 2
  - model_name: claude-aff
    litellm_params:
      model: os.environ/MODEL_C                     # eu.anthropic.claude-opus-4-7
      aws_region_name: os.environ/REGION_C          # eu-west-1
      api_key: os.environ/AWS_BEARER_TOKEN_BEDROCK
      tags: ["acct-2"]
    model_info:
      id: dep-eu
      hrw_weight: 1

router_settings:
  enable_tag_filtering: true

litellm_settings:
  callbacks: session_affinity.proxy_handler_instance

general_settings:
  master_key: sk-test
